set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sa terminal-overrides ",xterm-256color:Tc"
set -g default-shell /usr/bin/fish

set -g update-environment "DISPLAY WAYLAND_DISPLAY XDG_RUNTIME_DIR"

set-environment -g DISPLAY "$DISPLAY"
set-environment -g WAYLAND_DISPLAY "$WAYLAND_DISPLAY"
set-environment -g XDG_RUNTIME_DIR "$XDG_RUNTIME_DIR"

set-option -g repeat-time 1000
set-option -g focus-events on

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-window-option -g mode-keys vi

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind o run-shell "open '#{pane_current_path}'"
bind -r e kill-pane -a

bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5

unbind '"'
unbind %
bind v split-window -v
bind h split-window -h

set-option -g status-justify "left"
set-option -g mouse on

set-option -g status-style bg=colour240,fg=colour246

set-window-option -g window-status-style fg=colour246,bg=colour240,dim
set-window-option -g window-status-current-style fg=colour235,bg=colour118,bright

set-option -g pane-border-style fg=colour240
set-option -g pane-active-border-style fg=colour118,bg=default

set-option -g message-style bg=colour240,fg=colour202

set-option -g display-panes-active-colour colour202
set-option -g display-panes-colour colour27

set-window-option -g clock-mode-colour colour118

set -g set-titles on
set -g set-titles-string "#T"

source ~/.config/tmux/statusline.conf
source ~/.config/tmux/utility.conf
